name: Zero-Touch Deployment Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with pytest
        run: pytest tests/ -v --tb=short
        continue-on-error: false

      - name: Generate coverage report
        run: pytest tests/ --cov=src --cov-report=xml
        continue-on-error: true

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-railway:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Validate deployment config
        run: |
          if [ ! -f "railway.toml" ]; then
            echo "❌ railway.toml is missing!"
            exit 1
          fi
          echo "✅ railway.toml found"
          if [ ! -f "Dockerfile" ]; then
            echo "❌ Dockerfile is missing!"
            exit 1
          fi
          echo "✅ Dockerfile found"

      - name: Deploy to Railway
        run: |
          echo "🚀 Autonomous Butler Core deployment initiated"
          echo "✅ Image: ${{ env.REGISTRY }}/${{ github.repository }}:latest"
          echo "✅ Commit: ${{ github.sha }}"
          echo "✅ Branch: ${{ github.ref }}"
          echo "✅ Railway auto-deploy will be triggered via git push"
          echo "🎯 Deployment Details:"
          echo "   - Service: autonomous-butler-core"
          echo "   - Port: 8000"
          echo "   - Health Check: /health"
          echo "   - Start Command: uvicorn src.main:app --host 0.0.0.0 --port \$PORT"
